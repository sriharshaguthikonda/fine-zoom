<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Fine Zoom Step</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>Fine Zoom Step</h1>
        <p>Fine-grained zoom controls for keyboard and Ctrl/Cmd plus Wheel.</p>
      </header>

      <section class="section">
        <h2>Step Size</h2>
        <label class="field">
          <span>Step size (%)</span>
          <input id="stepPercent" type="number" min="0.1" max="10" step="0.1">
        </label>
        <label class="field">
          <span>Shift plus Wheel step (%)</span>
          <input id="shiftWheelStepPercent" type="number" min="0.1" max="20" step="0.1">
        </label>
        <label class="field">
          <span>Shift plus Wheel mode</span>
          <select id="shiftWheelMode">
            <option value="zoom">Zoom using Shift wheel step</option>
            <option value="off">Off</option>
          </select>
        </label>
      </section>

      <section class="section">
        <h2>Ctrl/Cmd plus Wheel</h2>
        <label class="field">
          <span>Mode</span>
          <select id="ctrlWheelMode">
            <option value="off">Off</option>
            <option value="zoom">Zoom using step size</option>
            <option value="block">Block browser zoom (scroll instead)</option>
          </select>
        </label>

        <div class="grid">
          <label class="field">
            <span>Scroll threshold (px)</span>
            <input id="scrollThreshold" type="number" min="1" max="200" step="1">
          </label>
          <label class="field">
            <span>Min delay (ms)</span>
            <input id="minDelayMs" type="number" min="0" max="1000" step="10">
          </label>
        </div>

        <label class="field checkbox">
          <input id="directionReversed" type="checkbox">
          <span>Reverse wheel direction</span>
        </label>
        <label class="field checkbox">
          <input id="smoothScroll" type="checkbox">
          <span>Smooth scroll when blocking browser zoom</span>
        </label>
      </section>

      <section class="section">
        <h2>Shortcuts</h2>
        <label class="field">
          <span>Zoom in</span>
          <input id="shortcutZoomIn" type="text" readonly>
        </label>
        <label class="field">
          <span>Zoom out</span>
          <input id="shortcutZoomOut" type="text" readonly>
        </label>
        <label class="field">
          <span>Reset zoom</span>
          <input id="shortcutZoomReset" type="text" readonly>
        </label>
        <p class="help">Click a shortcut field and press keys to set it. Use Backspace/Delete to clear.</p>
        <p class="help">Shortcut handling works on normal web pages, not browser-internal pages.</p>
      </section>

      <section class="section">
        <h2>Shortcut Scope</h2>
        <label class="field field-stack">
          <span>Disable keyboard shortcuts on hosts (one per line)</span>
          <textarea id="shortcutDisabledHosts" rows="4" placeholder="example.com"></textarea>
        </label>
        <div class="actions">
          <button id="disableCurrentHost" type="button">Disable on this site</button>
          <button id="enableCurrentHost" type="button" class="btn-ghost">Enable on this site</button>
        </div>
      </section>

      <footer class="footer">
        <button id="reset" type="button">Reset to defaults</button>
        <span id="status" role="status"></span>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
